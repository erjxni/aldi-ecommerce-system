name: Daily Build & Integration Test

on:
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8:00 AM UTC
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # Allows manual trigger

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run database integration tests
        env:
          ALDI_SQL_CONNECT_API_KEY: ${{ secrets.ALDI_SQL_CONNECT_API_KEY }}
        run: npm test
