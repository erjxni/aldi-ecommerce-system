<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ALDI E-Commerce</title>
  <link rel="stylesheet" href="checkout.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/public/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/public/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/public/favicon-16x16.png">
  <link rel="manifest" href="/assets/public/site.webmanifest">
</head>
<body>
    <header class="checkout-header">
        <a href="products.html" class="back-link">&lt; Back to Shop</a>
        <h1>Secure Checkout</h1>
        <p>Submit your shipping and mock payment details to finalize your order.</p>
    </header>

    <main class="checkout-layout">
        <section class="checkout-card">
            <form id="checkout-form">
                <h2>1. Shipping Information</h2>

                <div class="form-grid">
                    <label>
                        First Name
                        <input type="text" id="firstName" name="firstName" required>
                    </label>

                    <label>
                        Last Name
                        <input type="text" id="lastName" name="lastName" required>
                    </label>
                </div>

                <label>
                    Email Address
                    <input type="email" id="email" name="email" required>
                </label>

                <label>
                    Street Address
                    <input type="text" id="address" name="address" required>
                </label>

                <div class="form-grid">
                    <label>
                        City
                        <input type="text" id="city" name="city" required>
                    </label>

                    <label>
                        ZIP / Postal Code
                        <input type="text" id="postalCode" name="postalCode" required>
                    </label>
                </div>

                <h2>2. Mock Payment Information</h2>

                <label>
                    Payment Method
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="">Select payment method</option>
                        <option value="mock_card">Mock Credit / Debit Card</option>
                        <option value="mock_paypal">Mock PayPal</option>
                    </select>
                </label>

                <label>
                    Card Number
                    <input
                        type="text"
                        id="cardNumber"
                        name="cardNumber"
                        maxlength="19"
                        placeholder="4111 1111 1111 1111"
                    >
                </label>

                <div class="form-grid">
                    <label>
                        Expiry Date
                        <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY">
                    </label>

                    <label>
                        CVV
                        <input type="password" id="cvv" name="cvv" maxlength="4">
                    </label>
                </div>

                <button type="submit" class="checkout-button">
                    Complete Order
                </button>

                <p id="checkout-message" class="checkout-message"></p>
            </form>
        </section>

        <aside class="checkout-card">
            <h2>Order Summary</h2>

            <div id="cart-summary" class="cart-summary">
                Loading cart summary...
            </div>

            <div class="summary-row">
                <span>Subtotal</span>
                <strong id="subtotal">€0.00</strong>
            </div>

            <div class="summary-row">
                <span>Shipping</span>
                <strong>FREE</strong>
            </div>

            <div class="summary-row total">
                <span>Total</span>
                <strong id="total">€0.00</strong>
            </div>
        </aside>
    </main>

    <script src="checkout.js"></script>
</body>
</html>
