<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmation - ALDI E-Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/public/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/public/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/public/favicon-16x16.png">
  <link rel="manifest" href="/assets/public/site.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - ALDI E-Commerce</title>
    <link rel="stylesheet" href="checkout.css">
</head>
<body>
    <header class="checkout-header">
        <a href="products.html" class="back-link">&lt; Back to Shop</a>
        <h1>Order Confirmation</h1>
        <p>Your order has been securely placed.</p>
    </header>

    <main class="checkout-layout">
        <section class="checkout-card">
            <h2>Thank you for your order.</h2>
            <p id="confirmation-message">
                Your order has been created successfully and is currently pending.
            </p>

            <a href="products.html" class="back-link">Continue Shopping</a>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get("orderId");
        const total = params.get("total");

        if (orderId && total) {
            document.getElementById("confirmation-message").textContent =
                `Order #${orderId} has been created successfully. Total amount: €${Number(total).toFixed(2)}.`;
        }
    </script>
</body>
</html>
