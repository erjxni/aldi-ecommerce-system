<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmation - ALDI E-Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/public/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/public/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/public/favicon-16x16.png">
  <link rel="manifest" href="/assets/public/site.webmanifest">
</head>
<body class="confirmation-body">
  <div id="confirmation-app">
    <!-- Header -->
    <nav class="navbar solid-nav">
      <div class="nav-container">
        <div class="nav-left">
          <a href="/index.html" class="nav-logo">
            <img src="/assets/public/aldi_logo.svg" alt="ALDI Logo" class="aldi-logo-img" />
          </a>
        </div>
        <div class="nav-right">
          <div id="nav-auth-section" class="nav-auth-container" style="display: none;"></div>
        </div>
      </div>
    </nav>

    <!-- Main Container -->
    <main class="confirmation-container">
      <div class="confirmation-card">
        <div class="success-icon">✓</div>
        <h1>Thank you for your order!</h1>
        <p class="order-number">Order number: <strong id="display-order-number">#123456</strong></p>
        <p class="confirmation-message">
          We've received your order and will contact you as soon as your package is shipped. You can find your purchase details in your email.
        </p>
        <a href="/products.html" class="btn-primary btn-continue-shopping">Continue Shopping</a>
      </div>
    </main>
  </div>

  <script type="module" src="/js/main.js"></script>
  <!-- WhatsApp Floating Action Button -->
  <a href="https://wa.me/1234567890" class="whatsapp-fab" target="_blank" aria-label="Contact us on WhatsApp">
